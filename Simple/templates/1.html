<!DOCTYPE html>
<html>
<head>
    <title>Flask Request Example</title>
</head>
<body>

    <button onclick="getData()">Get Data 1</button>
    <p id="result"></p>

    <script>
        function getData() {
            fetch("http://127.0.0.1:5000/data")   // send request to Flask
                .then(response => response.text())
                .then(data => {
                    document.getElementById("result").innerText = data; // show response
                })
                .catch(error => console.error('Error:', error));
        }
    </script>

</body>
</html>
